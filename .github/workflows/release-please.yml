name: Release Please

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "release-please-config.json"
      - ".release-please-manifest.json"
      - ".github/workflows/release-please.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  # ────────────────────────────────────────────────────────────────────
  # 1. Open / update release PRs and (when one is merged) create tags +
  #    GitHub Releases for any packages with releasable commits.
  # ────────────────────────────────────────────────────────────────────
  release-please:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      # Release PRs opened with GITHUB_TOKEN never trigger CI, so their required
      # checks stay pending forever and the only way to land them is an admin
      # bypass. An App token is a separate identity, so its pushes start CI and
      # release PRs satisfy branch protection on their own.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: jmcombs
          repositories: pi-extensions

      - uses: actions/checkout@v7
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Generate release matrix
        id: set-matrix
        shell: bash
        env:
          RELEASE_OUTPUTS: ${{ toJSON(steps.release.outputs) }}
          CONFIG_PATH: "release-please-config.json"
        run: |
          node -e "const fs = require('fs'); const config = JSON.parse(fs.readFileSync(process.env.CONFIG_PATH, 'utf8')); const outputs = JSON.parse(process.env.RELEASE_OUTPUTS); const releasedPackages = Object.keys(config.packages).filter(pkgPath => outputs[pkgPath + '--release_created'] === 'true').map(pkgPath => ({ name: pkgPath.split('/').pop(), path: pkgPath, tag: outputs[pkgPath + '--tag_name'] })); console.log('matrix=' + JSON.stringify(releasedPackages));" >> $GITHUB_OUTPUT

  # ────────────────────────────────────────────────────────────────────
  # 2. Per-package npm publish jobs.
  #
  # Publishing uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret
  # is required. Each package must have a Trusted Publisher configured
  # on npmjs.com pointing at this repo and this workflow file. See
  # CONTRIBUTING.md → "Adding a New Extension" for the one-time setup.
  # ────────────────────────────────────────────────────────────────────

  publish:
    name: Publish @jmcombs/pi-${{ matrix.package.name }}
    needs: release-please
    if: ${{ needs.release-please.outputs.matrix != '[]' && needs.release-please.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.release-please.outputs.matrix) }}
    permissions:
      contents: read
      id-token: write # required for npm OIDC publishing + provenance
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ matrix.package.tag }}

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Verify npm version
        run: npm --version

      - name: Install workspaces
        run: npm ci

      - name: Publish to npm with provenance (OIDC)
        run: npm publish --workspace=${{ matrix.package.path }} --provenance --access public
