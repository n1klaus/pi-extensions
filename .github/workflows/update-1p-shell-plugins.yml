name: Update 1Password Shell Plugins List

on:
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual triggering

# The App token below carries the write access; GITHUB_TOKEN stays read-only.
permissions:
  contents: read

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      # Branches pushed with GITHUB_TOKEN never trigger workflows, so a PR opened
      # with it would sit forever on pending required checks. An App token is a
      # distinct identity, so its push starts CI normally.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: jmcombs
          repositories: pi-extensions

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check for updates (dry-run)
        id: check
        run: |
          if npx tsx scripts/update-1p-shell-plugins.ts --check; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Run updater to refresh the list
        if: steps.check.outputs.has_changes == 'true'
        run: npx tsx scripts/update-1p-shell-plugins.ts

      - name: Create Pull Request
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          # `feat` (not `chore`) so release-please cuts a minor release — adding or
          # removing supported plugins is a consumer-visible capability change.
          # Both fields matter: a squash merge takes the commit message from the PR
          # title, a merge commit preserves commit-message. They must agree.
          commit-message: |
            feat(1password): update curated shell plugins list from upstream source
          title: "feat(1password): update shell plugins list"
          body: |
            Automated weekly update of the 1Password shell plugins data.

            This PR was generated by `.github/workflows/update-1p-shell-plugins.yml`.

            **Changes:**
            - Refreshed the plugin list from the upstream `1Password/shell-plugins` repository
            - Updated environment variable mappings

            Please review the diff before merging.
          branch: chore/update-1p-shell-plugins
          labels: |
            1password
            automated
          reviewers: jmcombs
          delete-branch: true
