name: Update 1Password Shell Plugins List

on:
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read
  pull-requests: write

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check for updates (dry-run)
        id: check
        run: |
          if npx tsx scripts/update-1p-shell-plugins.ts --check; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Run updater to refresh the list
        if: steps.check.outputs.has_changes == 'true'
        run: npx tsx scripts/update-1p-shell-plugins.ts

      - name: Create Pull Request
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(1password): update curated shell plugins list from 1Password docs
          title: "chore(1password): update shell plugins list"
          body: |
            Automated weekly update of the 1Password shell plugins data.

            This PR was generated by `.github/workflows/update-1p-shell-plugins.yml`.

            **Changes:**
            - Refreshed list of supported integrations from official 1Password documentation
            - Updated environment variable mappings

            Please review the diff before merging.
          branch: chore/update-1p-shell-plugins
          branch-suffix: timestamp
          labels: |
            1password
            automated
          reviewers: jmcombs
          delete-branch: true
